<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Портфолио</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(180deg, #cfe9ff, #fff4b5);
      color: #333;
      text-align: center;
    }

    header {
      padding: 70px 20px 40px;
    }

    .sun {
      width: 70px;
      height: 70px;
      margin: 0 auto 15px;
      border-radius: 50%;
      background: #ffe066;
      box-shadow: 0 0 25px rgba(255, 220, 120, 0.6);
    }

    h1 {
      font-size: 38px;
      margin: 10px 0;
    }

    h2 {
      margin-top: 10px;
      font-weight: normal;
    }

    .about {
      max-width: 500px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      transition: 0.25s;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.03);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      border-radius: 12px;
      background: #f5f5f5;
      padding: 8px;
    }

    .card p {
      margin-top: 10px;
      font-size: 16px;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 14px;
      opacity: 0.7;
    }

  </style>
</head>

<body>

  <header>
    <div class="sun"></div>
    <h1>Привет!</h1>
  </header>

  <div class="about">
    <h2>Обо мне</h2>
    <p>Делаю сайты и учусь делать их аккуратными и красивыми.</p>
  </div>

  <h2>Персонажи Pixar</h2>

  <div class="gallery">

    <div class="card">
      <img src="https://cdn.ruwiki.ru/ruwiki/files/thumb/0/04/%D0%91%D0%B0%D0%B7%D0%B7_%D0%9B%D0%B0%D0%B9%D1%82%D0%B5%D1%80.png/554px-%D0%91%D0%B0%D0%B7%D0%B7_%D0%9B%D0%B0%D0%B9%D1%82%D0%B5%D1%80.png">
      <p>Базз Лайтер</p>
    </div>

    <div class="card">
      <img src="https://i.pinimg.com/originals/9c/cb/a0/9ccba08c5729c80f2e7f48ac45c00ede.jpg">
      <p>Шериф Вуди</p>
    </div>

    <div class="card">
      <img src="https://bumper-stickers.ru/79509-thickbox_default/vall-i.jpg">
      <p>WALL-E</p>
    </div>

    <div class="card">
      <img src="https://i.pinimg.com/originals/2c/86/25/2c8625cc73120616b1ea30e244f69b7e.jpg">
      <p>Молния Маквин</p>
    </div>

  </div>

  <footer>
    © 2026 моё портфолио
  </footer>

</body>
</html>
